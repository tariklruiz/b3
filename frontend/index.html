<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotações B3</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f11;
      --surface:   #16181c;
      --border:    #2a2d33;
      --accent:    #00e5a0;
      --accent-dim:#00a872;
      --text:      #e8eaed;
      --muted:     #6b7280;
      --red:       #ff5f5f;
      --green:     #00e5a0;
      --font-mono: 'DM Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .header-tag {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Ad banner top ── */
    .ad-top {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ad-placeholder {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--border);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px dashed var(--border);
      padding: 6px 20px;
      border-radius: 4px;
    }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 200px;
      flex: 1;
      gap: 0;
    }

    main {
      padding: 2.5rem 2rem;
      border-right: 1px solid var(--border);
    }

    /* ── Sidebar ad ── */
    .sidebar {
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .ad-side {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 8px;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Search panel ── */
    .panel-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 180px auto;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 2rem;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    input[type="text"], input[type="date"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 10px 14px;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }
    input[type="text"]:focus, input[type="date"]:focus {
      border-color: var(--accent-dim);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    .btn-search {
      background: var(--accent);
      color: #0e0f11;
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 10px 22px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      height: 40px;
    }
    .btn-search:hover { background: #00ffb2; }
    .btn-search:active { transform: scale(0.97); }
    .btn-search:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0 12px;
      height: 40px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* ── Ticker tags ── */
    .ticker-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1rem;
      min-height: 20px;
    }
    .ticker-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      animation: fadeIn 0.15s ease;
    }
    .ticker-tag button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      padding: 0;
    }
    .ticker-tag button:hover { color: var(--red); }

    /* ── Results ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .results-meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }
    .btn-export {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-export:hover { border-color: var(--accent-dim); color: var(--accent); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 0.82rem;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
    }
    th {
      text-align: left;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 12px;
      font-weight: 400;
    }
    td {
      padding: 11px 12px;
      border-bottom: 1px solid #1e2025;
      color: var(--text);
    }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--surface); }

    .td-ticker { color: var(--accent); font-weight: 500; }
    .td-price  { font-weight: 500; }
    .td-nodata { color: var(--muted); font-style: italic; }

    /* ── States ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-align: center;
    }
    .state-icon {
      font-size: 2rem;
      opacity: 0.3;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .error-msg {
      background: #1c1010;
      border: 1px solid #3d1c1c;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--red);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-note {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">cotações<span>.</span>b3</div>
  <div class="header-tag">dados históricos B3</div>
</header>

<div class="ad-top">
  <div class="ad-placeholder">espaço publicitário — 728×90</div>
</div>

<div class="layout">
  <main>
    <div class="panel-title">Consulta de Fechamento</div>

    <div class="form-row">
      <div class="field">
        <label>Ativos (separados por vírgula)</label>
        <input type="text" id="tickerInput" placeholder="Ex: MXRF11, HGLG11, PETR4"
               autocomplete="off" autocapitalize="characters" spellcheck="false" />
      </div>
      <div class="field">
        <label>Data do pregão</label>
        <input type="date" id="dateInput" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <div style="display:flex;gap:8px;">
          <button class="btn-search" id="searchBtn" onclick="search()">Consultar</button>
          <button class="btn-clear" id="clearBtn" onclick="clearAll()">Limpar</button>
        </div>
      </div>
    </div>

    <span id="dateWarn" style="font-family:var(--font-mono);font-size:0.68rem;color:var(--red);margin-bottom:8px;min-height:14px;display:block;"></span>
    <div class="ticker-tags" id="tickerTags"></div>

    <div id="results">
      <div class="state-box">
        <div class="state-icon">📊</div>
        <div>Informe os ativos e a data para consultar os preços de fechamento.</div>
      </div>
    </div>
  </main>

  <aside class="sidebar">
    <div class="ad-side">
      <div class="ad-placeholder" style="font-size:0.6rem; text-align:center; padding: 8px;">
        espaço<br/>publicitário<br/>200×250
      </div>
    </div>
    <div class="ad-side">
      <div class="ad-placeholder" style="font-size:0.6rem; text-align:center; padding: 8px;">
        espaço<br/>publicitário<br/>200×250
      </div>
    </div>
  </aside>
</div>

<footer>
  <div class="footer-note">Fonte: B3 — COTAHIST. Dados com defasagem de 1 dia útil.</div>
  <div class="footer-note" id="lastUpdate"></div>
</footer>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const API_BASE = "http://localhost:8000";   // <- change to Render URL after deploy

  const dateInput = document.getElementById("dateInput");
  let availableDates = new Set();

  // ── Load all trading dates on startup ────────────────────────────────────
  async function loadAvailableDates() {
    try {
      const res  = await fetch(`${API_BASE}/dates/all`);
      const data = await res.json();
      availableDates = new Set(data.dates);
      dateInput.min   = data.earliest;
      dateInput.max   = data.latest;
      dateInput.value = data.latest;
      document.getElementById("lastUpdate").textContent =
        `Último pregão: ${formatDate(data.latest)}`;
    } catch (e) {
      dateInput.value = new Date().toISOString().split("T")[0];
    }
  }

  // ── Warn and disable button if selected date has no data ───────────────
  function validateDate() {
    const warn = document.getElementById("dateWarn");
    const btn  = document.getElementById("searchBtn");
    if (availableDates.size > 0 && !availableDates.has(dateInput.value)) {
      warn.textContent  = "⚠ Sem pregão nesta data.";
      btn.disabled      = true;
    } else {
      warn.textContent  = "";
      btn.disabled      = false;
    }
  }

  dateInput.addEventListener("change", validateDate);

  loadAvailableDates();

  // ── Parse tickers from input ─────────────────────────────────────────────
  function parseTickers() {
    const raw = document.getElementById("tickerInput").value;
    return [...new Set(
      raw.split(/[,;\s]+/)
         .map(t => t.trim().toUpperCase())
         .filter(t => t.length > 0)
    )];
  }

  // ── Render ticker tags ───────────────────────────────────────────────────
  document.getElementById("tickerInput").addEventListener("input", renderTags);

  function renderTags() {
    const tickers = parseTickers();
    const container = document.getElementById("tickerTags");
    container.innerHTML = tickers.map(t => `
      <span class="ticker-tag">
        ${t}
        <button onclick="removeTicker('${t}')" title="Remover">×</button>
      </span>
    `).join("");
  }

  function removeTicker(ticker) {
    const tickers = parseTickers().filter(t => t !== ticker);
    document.getElementById("tickerInput").value = tickers.join(", ");
    renderTags();
  }

  // ── Enter key triggers search ─────────────────────────────────────────────
  document.getElementById("tickerInput").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });
  dateInput.addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });

  // ── Main search ───────────────────────────────────────────────────────────
  async function search() {
    const tickers = parseTickers();
    const date    = dateInput.value;
    const btn     = document.getElementById("searchBtn");

    if (!tickers.length) {
      showError("Informe pelo menos um ativo.");
      return;
    }
    if (!date) {
      showError("Selecione uma data.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "...";
    showLoading();

    try {
      const url = `${API_BASE}/prices?tickers=${tickers.join(",")}&date=${date}`;
      const res = await fetch(url);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `Erro ${res.status}`);
      }

      const data = await res.json();
      renderResults(data);

    } catch (err) {
      showError(err.message.includes("fetch")
        ? "Não foi possível conectar à API. Verifique se o servidor está rodando."
        : err.message
      );
    } finally {
      btn.disabled = false;
      btn.textContent = "Consultar";
    }
  }

  // ── Render results table ──────────────────────────────────────────────────
  function renderResults(data) {
    const results  = data.results;
    const dateStr  = formatDate(data.date);
    const found    = results.filter(r => r.close !== null).length;
    const total    = results.length;

    const rows = results.map(r => {
      if (r.close === null) {
        return `
          <tr>
            <td class="td-ticker">${r.ticker}</td>
            <td class="td-nodata" colspan="1">Sem negociação nesta data</td>
          </tr>`;
      }
      return `
        <tr>
          <td class="td-ticker">${r.ticker}</td>
          <td class="td-price">R$ ${r.close.toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
        </tr>`;
    }).join("");

    document.getElementById("results").innerHTML = `
      <div class="results-header">
        <div class="results-meta">${dateStr} — ${found}/${total} ativos com dados</div>
        <button class="btn-export" onclick="exportCSV(${JSON.stringify(data).replace(/"/g, "&quot;")})">
          Exportar CSV
        </button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Ativo</th>
            <th>Fechamento</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ── Export CSV ────────────────────────────────────────────────────────────
  function exportCSV(data) {
    const lines = ["Ativo;Data;Fechamento"];
    data.results.forEach(r => {
      lines.push(`${r.ticker};${r.date};${r.close !== null ? r.close.toFixed(2).replace(".", ",") : ""}`);
    });
    const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `cotacoes_${data.date}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function showLoading() {
    document.getElementById("results").innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <div>Consultando...</div>
      </div>`;
  }

  function showError(msg) {
    document.getElementById("results").innerHTML = `
      <div style="margin-top: 1rem;">
        <div class="error-msg">⚠ ${msg}</div>
      </div>`;
  }

  function formatDate(iso) {
    const [y, m, d] = iso.split("-");
    return `${d}/${m}/${y}`;
  }

  // ── Clear all ─────────────────────────────────────────────────────────────
  function clearAll() {
    document.getElementById("tickerInput").value = "";
    document.getElementById("tickerTags").innerHTML = "";
    document.getElementById("dateWarn").textContent = "";
    document.getElementById("results").innerHTML = `
      <div class="state-box">
        <div class="state-icon">📊</div>
        <div>Informe os ativos e a data para consultar os preços de fechamento.</div>
      </div>`;
    document.getElementById("searchBtn").disabled = false;
  }
</script>
</body>
</html>
