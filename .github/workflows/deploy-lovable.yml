name: Build & Deploy FII Guia React App

on:
  push:
    branches: [main]
    paths:
      - 'docs/lovable/src/**'
      - 'docs/lovable/index.html'
      - 'docs/lovable/vite.config.ts'
      - 'docs/lovable/package.json'
      - '.github/workflows/deploy-lovable.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/lovable/package-lock.json

      - name: Install dependencies
        working-directory: docs/lovable
        run: npm ci

      - name: Build
        working-directory: docs/lovable
        run: npm run build -- --base=/b3/lovable-dist/

      - name: Copy build output to docs/lovable-dist
        run: |
          rm -rf docs/lovable-dist
          cp -r docs/lovable/dist docs/lovable-dist

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lovable-dist
          git diff --staged --quiet || git commit -m "chore: deploy built React app [skip ci]"
          git push
