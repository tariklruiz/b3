name: Build & Deploy FII Guia React App

on:
  push:
    branches: [main]
    paths:
      - 'docs/lovable/src/**'
      - 'docs/lovable/index.html'
      - 'docs/lovable/vite.config.ts'
      - 'docs/lovable/package.json'
      - '.github/workflows/deploy-lovable.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/lovable/package-lock.json

      - name: Install dependencies
        working-directory: docs/lovable
        run: npm ci

      - name: Build
        working-directory: docs/lovable
        run: npm run build -- --base=/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/lovable/dist
          destination_dir: lovable-dist
          keep_files: true
