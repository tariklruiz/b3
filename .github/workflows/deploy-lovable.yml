name: Build & Deploy FII Guia React App

on:
  push:
    branches: [main]
    paths:
      - 'docs/lovable/src/**'
      - 'docs/lovable/index.html'
      - 'docs/lovable/vite.config.ts'
      - 'docs/lovable/package.json'
      - '.github/workflows/deploy-lovable.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/lovable/package-lock.json

      - name: Install dependencies
        working-directory: docs/lovable
        run: npm ci

      - name: Build
        working-directory: docs/lovable
        run: npm run build -- --base=/

      - name: Deploy built files to docs/ root
        run: |
          # Copy built assets to docs/ root (overwrites old lovable-dist)
          cp -r docs/lovable/dist/. docs/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets docs/*.js docs/*.css 2>/dev/null || true
          git add docs/
          git diff --staged --quiet || git commit -m "chore: deploy React app to docs/ [skip ci]"
          git push
